<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Zheka's Threads</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header class="header">
    <span class="logo-text">Zheka's Threads</span>
  </header>

  <main class="main">
    <!-- Compose section -->
    <div class="compose-section">
      <div class="thread-row">
        <div class="col-left">
          <div class="avatar avatar-me">Ч</div>
          <div class="thread-line"></div>
        </div>
        <div class="col-right">
          <div class="compose-meta">CherlenokYevgeniy</div>
          <div
            id="editor"
            class="editor"
            contenteditable="true"
            data-placeholder="Начать ветку..."
            spellcheck="true"
          ></div>

          <!-- Photo previews -->
          <div class="photo-previews" id="photoPreviews"></div>

          <!-- Toolbar -->
          <div class="toolbar">
            <!-- Photo -->
            <label class="t-btn" for="photoInput" title="Фото">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2.5"/>
                <circle cx="8.5" cy="8.5" r="1.5" fill="currentColor" stroke="none"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
            </label>
            <input type="file" id="photoInput" accept="image/*" multiple hidden />

            <!-- Emoji (wrapper for absolute positioning) -->
            <div class="emoji-wrap">
              <button class="t-btn" id="emojiToggle" title="Эмодзи">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M8 14s1.5 2 4 2 4-2 4-2"/>
                  <circle cx="9" cy="9" r="0.8" fill="currentColor" stroke="none"/>
                  <circle cx="15" cy="9" r="0.8" fill="currentColor" stroke="none"/>
                </svg>
              </button>
              <!-- Emoji picker -->
              <div class="emoji-panel" id="emojiPanel" hidden>
                <div class="ep-search-row">
                  <input type="text" id="emojiSearch" class="ep-search" placeholder="Поиск..." autocomplete="off" />
                </div>
                <div class="ep-cats" id="emojiCats"></div>
                <div class="ep-grid" id="emojiGrid"></div>
              </div>
            </div>

            <!-- Bold -->
            <button class="t-btn fmt" id="btnBold" data-cmd="bold" title="Жирный"><b>B</b></button>

            <!-- Italic -->
            <button class="t-btn fmt" id="btnItalic" data-cmd="italic" title="Курсив"><i>I</i></button>

            <!-- Strike -->
            <button class="t-btn fmt" id="btnStrike" data-cmd="strikeThrough" title="Зачёркнутый"><s>S</s></button>

            <span class="t-sep"></span>
            <span class="char-counter" id="charCounter">0 / 500</span>
          </div>
        </div>
      </div>

      <!-- Thread-mini row -->
      <div class="thread-row thread-mini-row">
        <div class="col-left">
          <div class="avatar avatar-mini"></div>
        </div>
        <div class="col-right">
          <span class="thread-mini-label">Добавить в ветку...</span>
        </div>
      </div>

      <!-- Footer bar -->
      <div class="compose-footer">
        <span class="compose-audience">Все могут отвечать</span>
        <button class="post-btn" id="publishBtn" disabled>Опубликовать</button>
      </div>
    </div>

    <div class="divider"></div>

    <!-- Feed -->
    <div id="feed" class="feed"></div>
  </main>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" id="lbClose">&#x2715;</button>
    <img id="lbImg" src="" alt="" />
  </div>

  <script src="app.js"></script>
</body>
</html>
